name: Battery News Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"  # 한국시간 오전 7시

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests feedparser pandas

      - run: python news_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
